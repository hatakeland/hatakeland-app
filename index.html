<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌱 ハタケランド</title>
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F5F0E8;--card:#FFFDF7;--green:#4A7C59;--green-light:#E8F0EB;--green-mid:#7AAF8A;--amber:#C4822A;--amber-light:#F5EBD8;--text:#2C2416;--text-mid:#6B5E4A;--text-light:#A09080;--border:#E0D8C8;--border-dark:#C8BCA8;--radius:14px;--radius-sm:8px;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C8BCA8' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.app{max-width:480px;margin:0 auto;padding:0 0 2rem;position:relative;z-index:1;}
.hdr{border-radius:0 0 24px 24px;margin-bottom:1rem;overflow:hidden;}
.hdr-bg{background:linear-gradient(160deg,#2D5A3D 0%,#4A7C59 40%,#6B9E7A 70%,#8FB89A 100%);padding:1.5rem 1rem 1.25rem;text-align:center;}
.hdr-logo{width:90px;height:90px;border-radius:50%;border:3px solid rgba(255,255,255,0.6);box-shadow:0 4px 20px rgba(0,0,0,0.2);margin:0 auto 10px;display:block;object-fit:cover;background:#fff;}
.hdr-title{font-family:'Klee One',cursive;font-size:13px;color:rgba(255,255,255,0.85);letter-spacing:0.15em;background:rgba(0,0,0,0.15);display:inline-block;padding:3px 12px;border-radius:20px;}
.tabs-wrap{padding:0 0.75rem;}
.tabs{display:flex;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.tab{flex:1;padding:8px 4px;font-size:11px;cursor:pointer;background:transparent;color:var(--text-mid);border:none;font-family:'Noto Sans JP',sans-serif;font-weight:500;transition:all 0.2s;}
.tab.active{background:var(--green);color:#fff;}
.sec{display:none;padding:0.75rem;}
.sec.active{display:block;}
.crop-list{display:flex;flex-direction:column;gap:10px;}
.crop-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.crop-card.open{border-color:var(--green);}
.crop-card.work-card.open{border-color:var(--amber);border-width:2px;}
.crop-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.crop-ico{font-size:26px;}
.crop-info{flex:1;}
.crop-name{font-size:14px;font-weight:700;color:var(--text);}
.crop-st{font-size:11px;color:var(--text-light);margin-top:2px;display:flex;align-items:center;gap:4px;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dg{background:#4A7C59;}.da{background:#C4822A;}.db{background:#5B8FBF;}.dw{background:#C4822A;}
.chevron{font-size:10px;color:var(--text-light);transition:transform 0.2s;}
.chevron.open{transform:rotate(180deg);}
.detail{border-top:1px dashed var(--border);padding:14px;display:none;background:var(--bg);}
.detail.open{display:block;}
.prev-record{background:var(--card);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--green-mid);}
.prev-title{font-size:10px;font-weight:700;color:var(--green);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.prev-photos{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.prev-thumb{width:60px;height:60px;object-fit:cover;border-radius:6px;}
.prev-memo{font-size:12px;color:var(--text-mid);line-height:1.6;}
.lbl{font-size:11px;color:var(--text-mid);margin-bottom:4px;font-weight:500;}
textarea{width:100%;height:64px;font-size:13px;resize:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:'Noto Sans JP',sans-serif;background:var(--card);color:var(--text);margin-bottom:10px;}
textarea:focus{outline:none;border-color:var(--green-mid);}
input[type=text],input[type=date]{width:100%;font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:'Noto Sans JP',sans-serif;background:var(--card);color:var(--text);margin-bottom:10px;}
input:focus{outline:none;border-color:var(--green-mid);}
.row2{display:flex;gap:8px;margin-bottom:10px;}
.row2>div{flex:1;}
.row2 input{margin-bottom:0;}
.photo-area{margin-bottom:10px;}
.photo-upload{width:100%;padding:10px;border:2px dashed var(--border-dark);border-radius:var(--radius-sm);background:var(--card);text-align:center;cursor:pointer;font-size:12px;color:var(--text-light);transition:all 0.2s;}
.photo-upload:hover{border-color:var(--green-mid);color:var(--green);}
.photo-previews{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.photo-thumb{position:relative;display:inline-block;}
.photo-thumb img{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);display:block;}
.photo-thumb-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:#e74c3c;color:#fff;border-radius:50%;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.photo-input{display:none;}
.sbtn{width:100%;padding:12px;font-size:13px;font-weight:700;cursor:pointer;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;margin-bottom:8px;font-family:'Noto Sans JP',sans-serif;transition:opacity 0.2s;}
.sbtn.amber{background:var(--amber);}
.sbtn:disabled{opacity:0.5;cursor:default;}
.add-crop-btn{width:100%;padding:11px;font-size:13px;cursor:pointer;border-radius:var(--radius);border:2px dashed var(--border-dark);background:transparent;color:var(--text-mid);font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;margin-top:4px;}
.add-crop-btn:hover{border-color:var(--green-mid);color:var(--green);}
.suggest-list{display:flex;flex-direction:column;gap:10px;}
.scard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;}
.stag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-bottom:6px;font-weight:700;}
.ts{background:var(--green-light);color:var(--green);}.tt{background:#E8F0F8;color:#3A6B9A;}.tp{background:var(--amber-light);color:var(--amber);}
.sname{font-size:15px;font-weight:700;color:var(--text);font-family:'Klee One',cursive;}
.sdesc{font-size:12px;color:var(--text-mid);margin-top:5px;line-height:1.7;}
.smore-btn{margin-top:10px;font-size:12px;color:var(--green);cursor:pointer;background:none;border:1px solid var(--green-mid);padding:5px 14px;border-radius:20px;font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;}
.smore-btn:hover{background:var(--green);color:#fff;}
.smore-content{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12px;color:var(--text-mid);line-height:1.7;white-space:pre-wrap;}
.smore-content.open{display:block;}
.trend-btn{width:100%;padding:11px;font-size:13px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px dashed var(--border-dark);background:transparent;color:var(--text-mid);margin-top:10px;font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;}
.trend-btn:disabled{opacity:0.5;cursor:default;}
.log-filter{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.filter-btn{flex:none;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;cursor:pointer;background:var(--card);color:var(--text-mid);white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;}
.filter-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.log-list{display:flex;flex-direction:column;gap:10px;}
.log-item{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.log-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.log-crop{font-size:13px;font-weight:700;color:var(--text);}
.log-date{font-size:11px;color:var(--text-light);}
.log-photos{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.log-photo{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);}
.log-memo{font-size:12px;color:var(--text-mid);line-height:1.6;margin-top:4px;}
.log-ai-box{background:var(--green-light);border-radius:var(--radius-sm);padding:10px;margin-top:8px;border:1px solid var(--green-mid);}
.log-ai-lbl{font-size:10px;font-weight:700;color:var(--green);letter-spacing:0.08em;margin-bottom:4px;}
.log-ai-txt{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap;}
.log-ai-btn{width:100%;padding:9px;font-size:12px;cursor:pointer;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;margin-top:8px;font-family:'Noto Sans JP',sans-serif;font-weight:700;transition:opacity 0.2s;}
.log-ai-btn:disabled{opacity:0.5;}
.log-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
.edit-btn{flex:1;padding:7px;font-size:11px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px solid var(--green-mid);background:transparent;color:var(--green);font-family:'Noto Sans JP',sans-serif;}
.del-btn2{flex:none;padding:7px 12px;font-size:11px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text-light);font-family:'Noto Sans JP',sans-serif;}
.board-input-area{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.board-input-area h3{font-family:'Klee One',cursive;font-size:14px;color:var(--amber);margin-bottom:10px;}
.board-list{display:flex;flex-direction:column;gap:8px;}
.board-item{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.board-item.done{opacity:0.5;}
.board-item-head{display:flex;align-items:flex-start;gap:10px;}
.board-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-dark);background:transparent;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s;}
.board-check.checked{background:var(--green);border-color:var(--green);color:#fff;}
.board-content{flex:1;}
.board-text{font-size:13px;color:var(--text);line-height:1.6;}
.board-item.done .board-text{text-decoration:line-through;color:var(--text-light);}
.board-photos{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.board-photo{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);}
.board-meta{font-size:10px;color:var(--text-light);margin-top:4px;}
.board-del{font-size:11px;color:var(--text-light);background:none;border:none;cursor:pointer;padding:0;margin-top:4px;}
.name-sel{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.name-btn{flex:none;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;background:var(--card);color:var(--text-mid);font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;}
.name-btn.selected{background:var(--amber);color:#fff;border-color:var(--amber);}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,36,22,0.6);z-index:100;padding:1rem;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--bg);border-radius:var(--radius);padding:1.25rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;border:1.5px solid var(--border-dark);}
.modal-box h3{font-family:'Klee One',cursive;font-size:16px;font-weight:600;color:var(--green);margin-bottom:12px;}
.edit-photo-previews{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.edit-photo-thumb{position:relative;display:inline-block;}
.edit-photo-thumb img{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);display:block;}
.edit-photo-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:#e74c3c;color:#fff;border-radius:50%;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.modal-btns{display:flex;gap:8px;margin-top:12px;}
.modal-save{flex:2;padding:11px;font-size:13px;font-weight:700;cursor:pointer;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;font-family:'Noto Sans JP',sans-serif;}
.modal-cancel{flex:1;padding:11px;font-size:13px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px solid var(--border-dark);background:transparent;color:var(--text-mid);font-family:'Noto Sans JP',sans-serif;}
.ico-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.ico-btn{width:42px;height:42px;font-size:22px;cursor:pointer;border-radius:8px;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;}
.ico-btn.selected{border-color:var(--green);background:var(--green-light);}
.status-sel{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.status-btn{flex:1;min-width:70px;padding:7px;font-size:11px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);color:var(--text-mid);font-family:'Noto Sans JP',sans-serif;text-align:center;}
.status-btn.selected{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:700;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2416;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.empty{font-size:13px;color:var(--text-light);text-align:center;padding:2.5rem 0;}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:2rem 0;font-size:13px;color:var(--text-light);}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-bg">
      <img class="hdr-logo" src="icon.png" alt="ハタケランド">
      <div class="hdr-title">作物の記録とAIアドバイス</div>
    </div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="sw('crops')">作物管理</button>
      <button class="tab" onclick="sw('suggest')">おすすめ</button>
      <button class="tab" onclick="sw('log')">記録帳</button>
      <button class="tab" onclick="sw('board')">伝言板</button>
    </div>
  </div>
  <div id="t-crops" class="sec active">
    <div class="crop-list" id="cropList"></div>
    <button class="add-crop-btn" onclick="openAddCrop()">＋ 新しい作物を追加する</button>
  </div>
  <div id="t-suggest" class="sec">
    <div id="suggestList" class="suggest-list"></div>
    <button class="trend-btn" id="trendBtn" onclick="loadTrend()">🔍 最新トレンドを取得する</button>
  </div>
  <div id="t-log" class="sec">
    <div class="log-filter" id="logFilter"></div>
    <div id="logList"></div>
  </div>
  <div id="t-board" class="sec">
    <div class="board-input-area">
      <h3>📋 伝言・作業メモを追加</h3>
      <div class="lbl">投稿者</div>
      <div class="name-sel">
        <button class="name-btn selected" onclick="selectName('Nan')">Nan</button>
        <button class="name-btn" onclick="selectName('パートナー')">パートナー</button>
        <button class="name-btn" onclick="selectName('共有者')">共有者</button>
      </div>
      <div class="lbl">写真（任意）</div>
      <input type="file" accept="image/*" multiple class="photo-input" id="boardPhotoInput" onchange="onBoardPhotos(this)">
      <div class="photo-previews" id="boardPhotoPreviews"></div>
      <div class="photo-upload" onclick="document.getElementById('boardPhotoInput').click()">📷 写真を撮影・選択する</div>
      <div style="margin-top:10px;">
        <div class="lbl">内容</div>
        <textarea id="boardText" placeholder="例：1段目草刈り完了、菌ちゃんエサ豆乳やった…"></textarea>
      </div>
      <button class="sbtn amber" id="boardSaveBtn" onclick="saveBoard()">📌 投稿する</button>
    </div>
    <div id="boardList" class="board-list"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3 id="editTitle">記録を編集</h3>
    <div class="edit-photo-previews" id="editPhotoPreviews"></div>
    <div class="photo-upload" onclick="document.getElementById('editPhotoInput').click()" style="margin-bottom:10px;">📷 写真を追加する</div>
    <input type="file" accept="image/*" multiple class="photo-input" id="editPhotoInput" onchange="onEditPhotos(this)">
    <div class="lbl">日付</div>
    <input type="date" id="editDate">
    <div class="lbl">メモ</div>
    <textarea id="editMemo" placeholder="メモを入力…"></textarea>
    <div class="row2">
      <div><div class="lbl">サイズメモ</div><input type="text" id="editHeight" placeholder="例：高さ20cm"></div>
      <div><div class="lbl">気になること</div><input type="text" id="editConcern" placeholder="例：虫・変色"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="modal-save" id="editSaveBtn" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addCropModal">
  <div class="modal-box">
    <h3>新しい作物を追加</h3>
    <div class="lbl">アイコンを選ぶ</div>
    <div class="ico-grid" id="icoGrid"></div>
    <div class="lbl">作物名</div>
    <input type="text" id="newCropName" placeholder="例：ミニトマト">
    <div class="lbl">状態</div>
    <div class="status-sel">
      <button class="status-btn selected" onclick="selectStatus('生育中')">生育中</button>
      <button class="status-btn" onclick="selectStatus('収穫近し')">収穫近し</button>
      <button class="status-btn" onclick="selectStatus('発芽待ち')">発芽待ち</button>
      <button class="status-btn" onclick="selectStatus('収穫済み')">収穫済み</button>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeAddCrop()">キャンセル</button>
      <button class="modal-save" onclick="saveAddCrop()">追加する</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://bwhngwankpsejqeplwuh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3aG5nd2Fua3BzZWpxZXBsd3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTE3MTgsImV4cCI6MjA5MjAyNzcxOH0.oyRD5PjPbKMQZL0XneEUzQVYSEKx2fkyLW7lQYiu2WE';
const AI_PROXY=SUPABASE_URL+'/functions/v1/ai-proxy';
const STORAGE_BUCKET='hatakeland-photos';
const ICONS=['🍅','🫛','🫘','🧅','🧄','🥔','🌽','🥕','🥬','🥦','🍆','🫑','🌶️','🥒','🌿','🍠','🫐','🍓','🍋','🌱','🍉','🌾','🫚','🥑','🍄'];
const STATUS_DOTS={'生育中':'dg','収穫近し':'da','発芽待ち':'db','収穫済み':'da'};
const WORK_ID='__work__';

let crops=[
  {id:'snap',ico:'🫛',name:'スナップえんどう',status:'生育中',stage:'花が咲き始めた頃'},
  {id:'fava',ico:'🫘',name:'そら豆',status:'生育中',stage:'茎が伸びてきた段階'},
  {id:'onion',ico:'🧅',name:'早生玉ねぎ',status:'収穫近し',stage:'葉が倒れ始めている'},

async function compressPhoto(file,maxW=800){
  return new Promise(res=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxW/Math.max(img.width,img.height));
        const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(blob=>res(blob),'image/jpeg',0.7);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(blob,path){
  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${path}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'image/jpeg','x-upsert':'true'},
    body:blob
  });
  if(!res.ok)throw new Error(await res.text());
  return `${SUPABASE_URL}/storage/v1/object/sign/${STORAGE_BUCKET}/${path}`;
}

async function getSignedUrl(path){
  const res=await fetch(`${SUPABASE_URL}/storage/v1/object/sign/${STORAGE_BUCKET}/${path}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
    body:JSON.stringify({expiresIn:86400*365})
  });
  if(!res.ok)return null;
  const d=await res.json();
  return `${SUPABASE_URL}/storage/v1${d.signedURL}`;
}

async function uploadPhotos(files,prefix){
  const urls=[];
  for(let i=0;i<files.length;i++){
    const blob=await compressPhoto(files[i]);
    const path=`${prefix}_${Date.now()}_${i}.jpg`;
    await uploadPhoto(blob,path);
    const url=await getSignedUrl(path);
    if(url)urls.push(url);
  }
  return urls;
}

async function sbFetch(path,opts={}){
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',...(opts.extraHeaders||{})};
  if(opts.method==='DELETE')delete headers['Content-Type'];
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method:opts.method||'GET',headers,body:opts.body});
  if(!res.ok)throw new Error(await res.text());
  const txt=await res.text();return txt?JSON.parse(txt):[];
}

async function callAI(payload){
  const res=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},body:JSON.stringify(payload)});
  if(!res.ok)throw new Error(await res.text());return res.json();
}

  box.style.display='block';
  const recentLogs=getRecentLogs(l.crop_id,5);
  const historyText=recentLogs.map(r=>`[${fmtDate(r.log_date)}] ${r.memo||''}${r.height?' サイズ:'+r.height:''}${r.concern?' 気になること:'+r.concern:''}`).join('\n');

  try{
    const d=await callAI({model:'claude-sonnet-4-5',max_tokens:500,
      system:`あなたは広島県安佐南区の自然農法（菌ちゃん農法）農園「ハタケランド」専属の農業アドバイザーです。過去の記録履歴を必ず参考にして文脈を踏まえた具体的なアドバイスをしてください。回答は以下の3セクションで250字以内：\n【状況の読み取り】過去の記録から見えること\n【今すぐやること】具体的に1〜2個\n【次回の確認ポイント】\nやさしく実践的な日本語で。`,
      messages:[{role:'user',content:textContent}]});
    const txt=d.content?.map(b=>b.text||'').join('')||'取得できませんでした';
    box.innerHTML=`<div class="log-ai-lbl">AI農業アドバイザー</div><div class="log-ai-txt">${txt}</div>`;

  if(!confirm('この伝言を削除しますか？'))return;
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/board?id=eq.${id}`,{method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'}});
    if(!res.ok)throw new Error(await res.text());
    boardItems=boardItems.filter(x=>x.id!==id);
    renderBoard();showToast('削除しました');
  }catch(e){showToast('削除に失敗しました');}
}

function renderBoard(){
  const el=document.getElementById('boardList');
  if(!boardItems.length){el.innerHTML='<div class="empty">伝言・メモがありません。</div>';return;}
  el.innerHTML=boardItems.map(b=>{
    const photos=b.photo?JSON.parse(b.photo):[];
    return`<div class="board-item ${b.done?'done':''}">
      <div class="board-item-head">
        <button class="board-check ${b.done?'checked':''}" onclick="toggleBoardDone(${b.id},${b.done})">${b.done?'✓':''}</button>
        <div class="board-content">
          ${b.text?`<div class="board-text">${b.text}</div>`:''}
          ${photos.length?`<div class="board-photos">${photos.map(p=>`<img class="board-photo" src="${p}" onerror="this.style.display='none'">`).join('')}</div>`:''}
          <div class="board-meta">${b.author||''}・${fmtDateTime(b.created_at)}</div>
          <button class="board-del" onclick="deleteBoard(${b.id})">削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openAddCrop(){
  selectedIco=ICONS[0];selectedStatus='生育中';
  document.getElementById('newCropName').value='';
  document.getElementById('icoGrid').innerHTML=ICONS.map(ico=>`<button class="ico-btn ${ico===selectedIco?'selected':''}" onclick="selectIco('${ico}')">${ico}</button>`).join('');
  document.querySelectorAll('.status-btn').forEach(b=>{b.classList.toggle('selected',b.textContent===selectedStatus);});
  document.getElementById('addCropModal').classList.add('open');
}
function selectIco(ico){selectedIco=ico;document.querySelectorAll('.ico-btn').forEach(b=>{b.classList.toggle('selected',b.textContent===ico);});}
function selectStatus(s){selectedStatus=s;document.querySelectorAll('.status-btn').forEach(b=>{b.classList.toggle('selected',b.textContent===s);});}
function saveAddCrop(){
  const name=document.getElementById('newCropName').value.trim();
  if(!name){showToast('作物名を入力してください');return;}
  const newCrop={id:'crop_'+Date.now(),ico:selectedIco,name,status:selectedStatus,stage:'新しく追加した作物'};
  crops.splice(crops.length-1,0,newCrop);
  saveCropsLocal();renderCrops();closeAddCrop();showToast(name+'を追加しました');
}
function closeAddCrop(){document.getElementById('addCropModal').classList.remove('open');}

async function toggleMore(idx,name){
  const content=document.getElementById('smore-'+idx);
  const btn=document.getElementById('smorebtn-'+idx);
  if(content.classList.contains('open')){content.classList.remove('open');btn.textContent='MORE +';return;}
  if(moreContents[idx]){content.innerHTML=moreContents[idx];content.classList.add('open');btn.textContent='LESS −';return;}
  btn.disabled=true;btn.textContent='読み込み中...';
  try{
    const d=await callAI({model:'claude-sonnet-4-5',max_tokens:400,system:'農業×エンタメの専門家として簡潔に答えてください。300字以内。',messages:[{role:'user',content:`${name}について：栽培スケジュールとハタケランドのイベント・集客への活用方法を教えてください。`}]});
    const txt=d.content?.map(b=>b.text||'').join('')||'情報を取得できませんでした。';
    moreContents[idx]=txt;content.innerHTML=txt;content.classList.add('open');btn.textContent='LESS −';
  }catch(e){content.innerHTML='情報を取得できませんでした。';content.classList.add('open');btn.textContent='LESS −';}
  btn.disabled=false;
}

async function loadTrend(){
  const btn=document.getElementById('trendBtn');
  btn.disabled=true;btn.textContent='検索中...';
  try{
    const d=await callAI({model:'claude-sonnet-4-5',max_tokens:800,tools:[{type:'web_search_20250305',name:'web_search'}],
      system:`農業×エンタメのトレンドリサーチャーです。検索後、必ず以下のJSON配列だけを返してください。\n[{"tag":"ts","label":"旬の提案","ico":"絵文字","name":"作物名","desc":"100字以内"}]\ntagはts=旬/tt=海外/tp=話題。前置き・後置き・マークダウン一切不要。JSONのみ。`,
      messages:[{role:'user',content:`今日は${new Date().getMonth()+1}月${new Date().getDate()}日。広島の農家向けに今注目の野菜トレンドを4件検索して。JSON配列のみ返すこと。`}]});
    const txt=d.content?.filter(b=>b.type==='text').map(b=>b.text||'').join('')||'[]';
    const match=txt.match(/\[[\s\S]*\]/);
    let items=[];
    if(match){try{items=JSON.parse(match[0]);}catch(e){items=[];}}
    renderSuggests([...defaultSuggests,...items]);
  }catch(e){renderSuggests(defaultSuggests);}
  btn.disabled=false;btn.textContent='🔍 最新トレンドを取得する';
}

function renderSuggests(items){
  moreContents={};
  document.getElementById('suggestList').innerHTML=items.map((s,i)=>`
    <div class="scard"><span class="stag ${s.tag}">${s.label}</span><div class="sname">${s.ico} ${s.name}</div><div class="sdesc">${s.desc}</div>
    <button class="smore-btn" id="smorebtn-${i}" onclick="toggleMore(${i},'${s.name}')">MORE +</button>
    <div class="smore-content" id="smore-${i}"></div></div>`).join('');
}

function sw(tab){
  ['crops','suggest','log','board'].forEach(t=>{document.getElementById('t-'+t).classList.toggle('active',t===tab);});
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['crops','suggest','log','board'][i]===tab);});
  if(tab==='board'&&boardItems.length===0)loadBoard();
}

loadCrops();renderSuggests(defaultSuggests);loadLogs();renderCrops();
</script>
