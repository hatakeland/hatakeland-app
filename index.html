<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 ハタケランド</title>
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F0E8;
  --card:#FFFDF7;
  --green:#4A7C59;
  --green-light:#E8F0EB;
  --green-mid:#7AAF8A;
  --amber:#C4822A;
  --amber-light:#F5EBD8;
  --text:#2C2416;
  --text-mid:#6B5E4A;
  --text-light:#A09080;
  --border:#E0D8C8;
  --border-dark:#C8BCA8;
  --radius:14px;
  --radius-sm:8px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C8BCA8' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0;}
.app{max-width:480px;margin:0 auto;padding:0 0 2rem;position:relative;z-index:1;}

/* ヘッダー */
.hdr{position:relative;overflow:hidden;border-radius:0 0 24px 24px;margin-bottom:1rem;}
.hdr-bg{background:linear-gradient(160deg,#2D5A3D 0%,#4A7C59 40%,#6B9E7A 70%,#8FB89A 100%);padding:1.5rem 1rem 1.25rem;text-align:center;position:relative;}
.hdr-bg::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 10 Q55 0 60 10 Q65 20 60 25 Q55 30 50 25 Q45 20 50 10Z' fill='rgba(255,255,255,0.06)'/%3E%3Cpath d='M20 50 Q25 35 35 45 Q45 55 35 60 Q25 65 20 50Z' fill='rgba(255,255,255,0.04)'/%3E%3Cpath d='M70 60 Q80 50 85 65 Q90 80 75 75 Q65 70 70 60Z' fill='rgba(255,255,255,0.05)'/%3E%3Cpath d='M10 20 Q15 10 20 20 Q25 30 15 30 Q5 30 10 20Z' fill='rgba(255,255,255,0.04)'/%3E%3Cpath d='M80 20 Q85 10 90 20 Q95 30 85 28 Q75 26 80 20Z' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E");background-size:200px 200px;}
.hdr-logo{width:90px;height:90px;border-radius:50%;border:3px solid rgba(255,255,255,0.6);box-shadow:0 4px 20px rgba(0,0,0,0.2);margin:0 auto 10px;display:block;object-fit:cover;background:#fff;}
.hdr-title{font-family:'Klee One',cursive;font-size:13px;color:rgba(255,255,255,0.85);letter-spacing:0.15em;background:rgba(0,0,0,0.15);display:inline-block;padding:3px 12px;border-radius:20px;}

.tabs-wrap{padding:0 0.75rem;}
.tabs{display:flex;gap:0;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.tab{flex:1;padding:9px 8px;font-size:12px;cursor:pointer;background:transparent;color:var(--text-mid);border:none;font-family:'Noto Sans JP',sans-serif;font-weight:500;letter-spacing:0.05em;transition:all 0.2s;}
.tab.active{background:var(--green);color:#fff;}

.sec{display:none;padding:0.75rem;}
.sec.active{display:block;}
.crop-list{display:flex;flex-direction:column;gap:10px;}
.crop-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s;}
.crop-card.open{border-color:var(--green);}
.crop-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.crop-ico{font-size:26px;line-height:1;}
.crop-info{flex:1;}
.crop-name{font-size:14px;font-weight:700;color:var(--text);}
.crop-st{font-size:11px;color:var(--text-light);margin-top:2px;display:flex;align-items:center;gap:4px;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dg{background:#4A7C59;}.da{background:#C4822A;}.db{background:#5B8FBF;}
.chevron{font-size:10px;color:var(--text-light);transition:transform 0.2s;}
.chevron.open{transform:rotate(180deg);}
.detail{border-top:1px dashed var(--border);padding:14px;display:none;background:var(--bg);}
.detail.open{display:block;}
.prev-record{background:var(--card);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--green-mid);}
.prev-title{font-size:10px;font-weight:700;color:var(--green);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.prev-photos{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.prev-thumb{width:60px;height:60px;object-fit:cover;border-radius:6px;}
.prev-memo{font-size:12px;color:var(--text-mid);line-height:1.6;}
.prev-date{font-size:10px;color:var(--text-light);margin-top:4px;}
.lbl{font-size:11px;color:var(--text-mid);margin-bottom:4px;font-weight:500;letter-spacing:0.05em;}
textarea{width:100%;height:64px;font-size:13px;resize:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:'Noto Sans JP',sans-serif;background:var(--card);color:var(--text);margin-bottom:10px;}
textarea:focus{outline:none;border-color:var(--green-mid);}
input[type=text],input[type=date]{width:100%;font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-family:'Noto Sans JP',sans-serif;background:var(--card);color:var(--text);margin-bottom:10px;}
input:focus{outline:none;border-color:var(--green-mid);}
.row2{display:flex;gap:8px;margin-bottom:10px;}
.row2>div{flex:1;}
.row2 input{margin-bottom:0;}
.photo-area{margin-bottom:10px;}
.photo-upload{width:100%;padding:10px;border:2px dashed var(--border-dark);border-radius:var(--radius-sm);background:var(--card);text-align:center;cursor:pointer;font-size:12px;color:var(--text-light);transition:all 0.2s;}
.photo-upload:hover{border-color:var(--green-mid);color:var(--green);}
.photo-previews{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);}
.photo-input{display:none;}
.sbtn{width:100%;padding:12px;font-size:13px;font-weight:700;cursor:pointer;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;margin-bottom:8px;font-family:'Noto Sans JP',sans-serif;letter-spacing:0.05em;transition:opacity 0.2s;}
.sbtn:disabled{opacity:0.5;}
.suggest-list{display:flex;flex-direction:column;gap:10px;}
.scard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;}
.stag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-bottom:6px;font-weight:700;letter-spacing:0.05em;}
.ts{background:var(--green-light);color:var(--green);}.tt{background:#E8F0F8;color:#3A6B9A;}.tp{background:var(--amber-light);color:var(--amber);}
.sname{font-size:15px;font-weight:700;color:var(--text);font-family:'Klee One',cursive;}
.sdesc{font-size:12px;color:var(--text-mid);margin-top:5px;line-height:1.7;}
.smore-btn{margin-top:10px;font-size:12px;color:var(--green);cursor:pointer;background:none;border:1px solid var(--green-mid);padding:5px 14px;border-radius:20px;font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;}
.smore-btn:hover{background:var(--green);color:#fff;}
.smore-content{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12px;color:var(--text-mid);line-height:1.7;white-space:pre-wrap;}
.smore-content.open{display:block;}
.trend-btn{width:100%;padding:11px;font-size:13px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px dashed var(--border-dark);background:transparent;color:var(--text-mid);margin-top:10px;font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;}
.trend-btn:hover{border-color:var(--green-mid);color:var(--green);}
.trend-btn:disabled{opacity:0.5;cursor:default;}
.log-filter{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.filter-btn{flex:none;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;cursor:pointer;background:var(--card);color:var(--text-mid);white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all 0.2s;}
.filter-btn.active{background:var(--green);color:#fff;border-color:var(--green);}
.log-list{display:flex;flex-direction:column;gap:10px;}
.log-item{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.log-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.log-crop{font-size:13px;font-weight:700;color:var(--text);}
.log-date{font-size:11px;color:var(--text-light);}
.log-photos{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.log-photo{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);}
.log-memo{font-size:12px;color:var(--text-mid);line-height:1.6;margin-top:4px;}
.log-ai-box{background:var(--green-light);border-radius:var(--radius-sm);padding:10px;margin-top:8px;border:1px solid var(--green-mid);}
.log-ai-lbl{font-size:10px;font-weight:700;color:var(--green);letter-spacing:0.08em;margin-bottom:4px;}
.log-ai-txt{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap;}
.log-ai-btn{width:100%;padding:9px;font-size:12px;cursor:pointer;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;margin-top:8px;font-family:'Noto Sans JP',sans-serif;font-weight:700;transition:opacity 0.2s;}
.log-ai-btn:disabled{opacity:0.5;}
.log-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);}
.edit-btn{flex:1;padding:7px;font-size:11px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px solid var(--green-mid);background:transparent;color:var(--green);font-family:'Noto Sans JP',sans-serif;}
.del-btn2{flex:none;padding:7px 12px;font-size:11px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text-light);font-family:'Noto Sans JP',sans-serif;}
.edit-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,36,22,0.6);z-index:100;padding:1rem;align-items:center;justify-content:center;}
.edit-modal.open{display:flex;}
.edit-box{background:var(--bg);border-radius:var(--radius);padding:1.25rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;border:1.5px solid var(--border-dark);}
.edit-box h3{font-family:'Klee One',cursive;font-size:16px;font-weight:600;color:var(--green);margin-bottom:12px;}
.edit-photo-previews{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.edit-photo-thumb{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);}
.modal-btns{display:flex;gap:8px;margin-top:12px;}
.modal-save{flex:2;padding:11px;font-size:13px;font-weight:700;cursor:pointer;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;font-family:'Noto Sans JP',sans-serif;}
.modal-cancel{flex:1;padding:11px;font-size:13px;cursor:pointer;border-radius:var(--radius-sm);border:1.5px solid var(--border-dark);background:transparent;color:var(--text-mid);font-family:'Noto Sans JP',sans-serif;}
.empty{font-size:13px;color:var(--text-light);text-align:center;padding:2.5rem 0;}
.loading{font-size:13px;color:var(--text-light);text-align:center;padding:2rem 0;}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-bg">
      <img class="hdr-logo" src="icon.png" alt="ハタケランド">
      <div class="hdr-title">作物の記録とAIアドバイス</div>
    </div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="sw('crops')">作物管理</button>
      <button class="tab" onclick="sw('suggest')">おすすめ</button>
      <button class="tab" onclick="sw('log')">記録帳</button>
    </div>
  </div>

  <div id="t-crops" class="sec active">
    <div class="crop-list" id="cropList"></div>
  </div>
  <div id="t-suggest" class="sec">
    <div id="suggestList" class="suggest-list"></div>
    <button class="trend-btn" id="trendBtn" onclick="loadTrend()">🔍 最新トレンドを取得する</button>
  </div>
  <div id="t-log" class="sec">
    <div class="log-filter" id="logFilter"></div>
    <div id="logList"></div>
  </div>
</div>

<div class="edit-modal" id="editModal">
  <div class="edit-box">
    <h3 id="editTitle">記録を編集</h3>
    <div class="edit-photo-previews" id="editPhotoPreviews"></div>
    <div class="photo-upload" onclick="document.getElementById('editPhotoInput').click()" style="margin-bottom:10px;">📷 写真を追加・変更する</div>
    <input type="file" accept="image/*" multiple class="photo-input" id="editPhotoInput" onchange="onEditPhotos(this)">
    <div class="lbl">日付</div>
    <input type="date" id="editDate">
    <div class="lbl">メモ</div>
    <textarea id="editMemo" placeholder="メモを入力…"></textarea>
    <div class="row2">
      <div><div class="lbl">サイズメモ</div><input type="text" id="editHeight" placeholder="例：高さ20cm"></div>
      <div><div class="lbl">気になること</div><input type="text" id="editConcern" placeholder="例：虫・変色"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeEdit()">キャンセル</button>
      <button class="modal-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://bwhngwankpsejqeplwuh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3aG5nd2Fua3BzZWpxZXBsd3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTE3MTgsImV4cCI6MjA5MjAyNzcxOH0.oyRD5PjPbKMQZL0XneEUzQVYSEKx2fkyLW7lQYiu2WE';
const AI_PROXY=SUPABASE_URL+'/functions/v1/ai-proxy';

const crops=[
  {id:'snap',ico:'🫛',name:'スナップえんどう',status:'生育中',dot:'dg',stage:'花が咲き始めた頃'},
  {id:'fava',ico:'🫘',name:'そら豆',status:'生育中',dot:'dg',stage:'茎が伸びてきた段階'},
  {id:'onion',ico:'🧅',name:'早生玉ねぎ',status:'収穫近し',dot:'da',stage:'葉が倒れ始めている'},
  {id:'garlic',ico:'🧄',name:'にんにく',status:'生育中',dot:'dg',stage:'葉が伸びている'},
  {id:'mayo',ico:'🥔',name:'じゃがいも（メークイーン）',status:'発芽待ち',dot:'db',stage:'植え付けから2週間'},
  {id:'andes',ico:'🥔',name:'じゃがいも（アンデス赤）',status:'発芽待ち',dot:'db',stage:'植え付けから2週間'},
];

const defaultSuggests=[
  {tag:'ts',label:'旬の提案',ico:'🌽',name:'とうもろこし',desc:'5月上旬が種まきの適期。収穫まで約3ヶ月で夏イベントにぴったり。'},
  {tag:'tp',label:'話題のネタ',ico:'🫘',name:'そら豆（絵本ブーム）',desc:'「そらまめくんのベッド」が子育て世代に再ブーム。収穫体験×読み聞かせで子連れファミリーに刺さります。'},
  {tag:'tt',label:'海外トレンド',ico:'🫐',name:'スーパーフード系ベリー類',desc:'アメリカで健康志向急上昇中。国内でも注目されはじめており、マルシェでも人気が出ています。'},
];

let openId=null,logs=[],photoDataMap={},editingId=null,editPhotosData=[],currentFilter='all';

async function sbFetch(path,opts={}){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!res.ok)throw new Error(await res.text());
  const txt=await res.text();
  return txt?JSON.parse(txt):[];
}

async function callAI(payload){
  const res=await fetch(AI_PROXY,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},
    body:JSON.stringify(payload)
  });
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

async function loadLogs(){
  document.getElementById('logList').innerHTML='<div class="loading">読み込み中...</div>';
  try{logs=await sbFetch('logs?order=log_date.desc,created_at.desc');}
  catch(e){logs=[];}
  renderLog();renderFilter();renderCrops();
}

function fmtDate(d){if(!d)return'';return d.slice(0,10).replace(/-/g,'/');}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getLastLog(cropId){return logs.find(l=>l.crop_id===cropId);}
function getRecentLogs(cropId,n=5){return logs.filter(l=>l.crop_id===cropId).slice(0,n);}

function renderCrops(){
  document.getElementById('cropList').innerHTML=crops.map(c=>{
    const last=getLastLog(c.id);
    const photos=last&&last.photo?JSON.parse(last.photo):[];
    return`<div class="crop-card ${openId===c.id?'open':''}" id="cc-${c.id}">
      <div class="crop-row" onclick="toggle('${c.id}')">
        <div class="crop-ico">${c.ico}</div>
        <div class="crop-info">
          <div class="crop-name">${c.name}</div>
          <div class="crop-st"><span class="sdot ${c.dot}"></span>${c.status}</div>
        </div>
        <div class="chevron ${openId===c.id?'open':''}">▼</div>
      </div>
      <div class="detail ${openId===c.id?'open':''}" id="d-${c.id}">
        ${last?`<div class="prev-record">
          <div class="prev-title">📋 前回の記録 — ${fmtDate(last.log_date)}</div>
          ${photos.length?`<div class="prev-photos">${photos.map(p=>`<img class="prev-thumb" src="${p}">`).join('')}</div>`:''}
          ${last.memo?`<div class="prev-memo">📝 ${last.memo}</div>`:''}
          ${last.height?`<div class="prev-memo">📐 ${last.height}</div>`:''}
          ${last.concern?`<div class="prev-memo">⚠️ ${last.concern}</div>`:''}
        </div>`:''}
        <div class="photo-area">
          <div class="lbl">写真（複数枚可）</div>
          <input type="file" accept="image/*" multiple class="photo-input" id="pi-${c.id}" onchange="onPhotos('${c.id}',this)">
          <div class="photo-previews" id="pp-${c.id}"></div>
          <div class="photo-upload" onclick="document.getElementById('pi-${c.id}').click()">📷 写真を撮影・選択する</div>
        </div>
        <div class="lbl">日付</div>
        <input type="date" id="dt-${c.id}" value="${todayStr()}">
        <div class="lbl">今日の様子・メモ</div>
        <textarea id="memo-${c.id}" placeholder="例：アブラムシ発生、摘心した、葉が黄色い…"></textarea>
        <div class="row2">
          <div><div class="lbl">サイズメモ</div><input type="text" id="h-${c.id}" placeholder="例：高さ20cm"></div>
          <div><div class="lbl">気になること</div><input type="text" id="q-${c.id}" placeholder="例：虫・変色"></div>
        </div>
        <button class="sbtn" onclick="saveLog('${c.id}')">📝 記録を保存する</button>
        <div id="air-${c.id}"></div>
      </div>
    </div>`;
  }).join('');
}

function onPhotos(id,input){
  const files=Array.from(input.files);
  if(!files.length)return;
  photoDataMap[id]=photoDataMap[id]||[];
  const preview=document.getElementById('pp-'+id);
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      photoDataMap[id].push(e.target.result);
      preview.innerHTML=photoDataMap[id].map(p=>`<img class="photo-thumb" src="${p}">`).join('');
    };
    reader.readAsDataURL(file);
  });
}

function toggle(id){openId=openId===id?null:id;renderCrops();}

async function saveLog(id){
  const c=crops.find(x=>x.id===id);
  const memo=document.getElementById('memo-'+id).value;
  const h=document.getElementById('h-'+id).value;
  const q=document.getElementById('q-'+id).value;
  const dt=document.getElementById('dt-'+id).value;
  const photos=photoDataMap[id]||[];
  if(!memo&&!h&&!q&&!photos.length){alert('写真かメモを入れてください');return;}
  try{
    await sbFetch('logs',{method:'POST',body:JSON.stringify({
      crop_id:id,crop_name:c.name,crop_ico:c.ico,
      memo,height:h,concern:q,ai_advice:'',
      photo:JSON.stringify(photos),
      log_date:dt||todayStr()
    })});
    delete photoDataMap[id];
    await loadLogs();
    alert(`${c.name}の記録を保存しました！\n記録帳からAIアドバイスをもらえます。`);
    sw('log');
  }catch(e){alert('保存に失敗しました。'+e.message);}
}

async function askAIFromLog(logId){
  const l=logs.find(x=>x.id===logId);
  if(!l)return;
  const btn=document.getElementById('laibtn-'+logId);
  const box=document.getElementById('laibox-'+logId);
  btn.disabled=true;btn.textContent='考え中...';
  box.innerHTML='<div class="log-ai-lbl">AI農業アドバイザー</div><div class="log-ai-txt">過去の記録を分析中...</div>';
  box.style.display='block';

  const recentLogs=getRecentLogs(l.crop_id,5);
  const historyText=recentLogs.map(r=>`[${fmtDate(r.log_date)}] ${r.memo||''}${r.height?' サイズ:'+r.height:''}${r.concern?' 気になること:'+r.concern:''}`).join('\n');
  const photos=l.photo?JSON.parse(l.photo):[];
  const textContent=`作物：${l.crop_name}\n\n【今回の記録 ${fmtDate(l.log_date)}】\n${l.memo||''}${l.height?'\nサイズ：'+l.height:''}\n${l.concern?'気になること：'+l.concern+'\n':''}\n【過去の記録履歴】\n${historyText}\n\n広島県安佐南区・菌ちゃん農法で栽培。過去の記録を踏まえてアドバイスをお願いします。`;

  let userContent=photos.length?[
    ...photos.map(p=>({type:'image',source:{type:'base64',media_type:p.split(';')[0].split(':')[1],data:p.split(',')[1]}})),
    {type:'text',text:textContent}
  ]:textContent;

  try{
    const d=await callAI({
      model:'claude-sonnet-4-5',max_tokens:600,
      system:`あなたは広島県安佐南区の自然農法（菌ちゃん農法）農園「ハタケランド」専属の農業アドバイザーです。過去の記録履歴を必ず参考にして、文脈を踏まえた具体的なアドバイスをしてください。写真がある場合は必ず触れてください。回答は以下の3セクションで300字以内：\n【状況の読み取り】過去の記録から見えること\n【今すぐやること】具体的に1〜2個\n【次回の確認ポイント】\nやさしく実践的な日本語で。`,
      messages:[{role:'user',content:userContent}]
    });
    const txt=d.content?.map(b=>b.text||'').join('')||'取得できませんでした';
    box.innerHTML=`<div class="log-ai-lbl">AI農業アドバイザー${photos.length?' 📷':''}</div><div class="log-ai-txt">${txt}</div>`;
    await sbFetch(`logs?id=eq.${logId}`,{method:'PATCH',body:JSON.stringify({ai_advice:txt})});
    const idx=logs.findIndex(x=>x.id===logId);
    if(idx>-1)logs[idx].ai_advice=txt;
  }catch(e){
    box.innerHTML=`<div class="log-ai-lbl">AI農業アドバイザー</div><div class="log-ai-txt">エラーが発生しました。</div>`;
  }
  btn.disabled=false;btn.textContent='🌿 AIアドバイスを更新する';
}

function renderFilter(){
  const cropIds=['all',...new Set(logs.map(l=>l.crop_id))];
  document.getElementById('logFilter').innerHTML=cropIds.map(id=>{
    if(id==='all')return`<button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">すべて</button>`;
    const c=crops.find(x=>x.id===id);
    if(!c)return'';
    return`<button class="filter-btn ${currentFilter===id?'active':''}" onclick="setFilter('${id}')">${c.ico} ${c.name}</button>`;
  }).join('');
}

function setFilter(id){currentFilter=id;renderFilter();renderLog();}

function renderLog(){
  const el=document.getElementById('logList');
  const filtered=currentFilter==='all'?logs:logs.filter(l=>l.crop_id===currentFilter);
  if(!filtered.length){el.innerHTML='<div class="empty">まだ記録がありません。<br>作物管理タブから記録してみましょう。</div>';return;}
  el.innerHTML='<div class="log-list">'+filtered.map(l=>{
    const photos=l.photo?JSON.parse(l.photo):[];
    const hasAI=l.ai_advice&&l.ai_advice.length>0;
    return`<div class="log-item">
      <div class="log-head">
        <div class="log-crop">${l.crop_ico} ${l.crop_name}</div>
        <div class="log-date">${fmtDate(l.log_date)}</div>
      </div>
      ${photos.length?`<div class="log-photos">${photos.map(p=>`<img class="log-photo" src="${p}">`).join('')}</div>`:''}
      ${l.memo?`<div class="log-memo">📝 ${l.memo}</div>`:''}
      ${l.height?`<div class="log-memo">📐 ${l.height}</div>`:''}
      ${l.concern?`<div class="log-memo">⚠️ ${l.concern}</div>`:''}
      <div class="log-ai-box" id="laibox-${l.id}" style="${hasAI?'':'display:none'}">
        ${hasAI?`<div class="log-ai-lbl">AI農業アドバイザー</div><div class="log-ai-txt">${l.ai_advice}</div>`:''}
      </div>
      <button class="log-ai-btn" id="laibtn-${l.id}" onclick="askAIFromLog(${l.id})">
        ${hasAI?'🌿 AIアドバイスを更新する':'🌿 この記録でAIアドバイスをもらう'}
      </button>
      <div class="log-actions">
        <button class="edit-btn" onclick="openEdit(${l.id})">✏️ 編集・追記</button>
        <button class="del-btn2" onclick="deleteLog(${l.id})">削除</button>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function openEdit(id){
  const l=logs.find(x=>x.id===id);
  if(!l)return;
  editingId=id;
  editPhotosData=l.photo?JSON.parse(l.photo):[];
  document.getElementById('editTitle').textContent=`${l.crop_ico} ${l.crop_name}の記録を編集`;
  document.getElementById('editMemo').value=l.memo||'';
  document.getElementById('editHeight').value=l.height||'';
  document.getElementById('editConcern').value=l.concern||'';
  document.getElementById('editDate').value=l.log_date?l.log_date.slice(0,10):'';
  document.getElementById('editPhotoPreviews').innerHTML=editPhotosData.map(p=>`<img class="edit-photo-thumb" src="${p}">`).join('');
  document.getElementById('editModal').classList.add('open');
}

function onEditPhotos(input){
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      editPhotosData.push(e.target.result);
      document.getElementById('editPhotoPreviews').innerHTML=editPhotosData.map(p=>`<img class="edit-photo-thumb" src="${p}">`).join('');
    };
    reader.readAsDataURL(file);
  });
}

async function saveEdit(){
  try{
    await sbFetch(`logs?id=eq.${editingId}`,{method:'PATCH',body:JSON.stringify({
      memo:document.getElementById('editMemo').value,
      height:document.getElementById('editHeight').value,
      concern:document.getElementById('editConcern').value,
      log_date:document.getElementById('editDate').value,
      photo:JSON.stringify(editPhotosData),
      edited_at:new Date().toISOString()
    })});
    await loadLogs();closeEdit();
  }catch(e){alert('保存に失敗しました。');}
}

function closeEdit(){
  document.getElementById('editModal').classList.remove('open');
  editingId=null;editPhotosData=[];
}

async function deleteLog(id){
  if(!confirm('この記録を削除しますか？'))return;
  try{
    await sbFetch(`logs?id=eq.${id}`,{method:'DELETE'});
    await loadLogs();
  }catch(e){alert('削除に失敗しました。');}
}

let moreContents={};
async function toggleMore(idx,name){
  const content=document.getElementById('smore-'+idx);
  const btn=document.getElementById('smorebtn-'+idx);
  if(content.classList.contains('open')){
    content.classList.remove('open');
    btn.textContent='MORE +';
    return;
  }
  if(moreContents[idx]){
    content.innerHTML=moreContents[idx];
    content.classList.add('open');
    btn.textContent='LESS −';
    return;
  }
  btn.disabled=true;btn.textContent='読み込み中...';
  try{
    const d=await callAI({
      model:'claude-sonnet-4-5',max_tokens:400,
      system:'農業×エンタメの専門家として、簡潔に答えてください。300字以内。',
      messages:[{role:'user',content:`${name}について：栽培スケジュールとハタケランドのイベント・集客への活用方法を教えてください。`}]
    });
    const txt=d.content?.map(b=>b.text||'').join('')||'情報を取得できませんでした。';
    moreContents[idx]=txt;
    content.innerHTML=txt;
    content.classList.add('open');
    btn.textContent='LESS −';
  }catch(e){
    content.innerHTML='情報を取得できませんでした。';
    content.classList.add('open');
    btn.textContent='LESS −';
  }
  btn.disabled=false;
}

async function loadTrend(){
  const btn=document.getElementById('trendBtn');
  btn.disabled=true;btn.textContent='検索中...';
  try{
    const d=await callAI({
      model:'claude-sonnet-4-5',max_tokens:800,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      system:`あなたは農業×エンタメのトレンドリサーチャーです。絵本・アニメ・SNS・海外ブーム・スーパーフード・道の駅人気品をリサーチ。結果はJSON配列のみ：[{"tag":"tp","label":"ラベル名","ico":"絵文字","name":"作物名","desc":"100字以内"}] tagはts=旬/tt=海外/tp=話題。JSONのみ返すこと。`,
      messages:[{role:'user',content:`今日は${new Date().getMonth()+1}月${new Date().getDate()}日。広島の農家向けに今注目の野菜トレンドを4件検索して。`}]
    });
    const txt=d.content?.map(b=>b.text||'').join('')||'[]';
    let items;
    try{items=JSON.parse(txt.replace(/```json|```/g,'').trim());}
    catch(e){items=[];}
    renderSuggests([...defaultSuggests,...items]);
  }catch(e){renderSuggests(defaultSuggests);}
  btn.disabled=false;btn.textContent='🔍 最新トレンドを取得する';
}

function renderSuggests(items){
  moreContents={};
  document.getElementById('suggestList').innerHTML=items.map((s,i)=>`
    <div class="scard">
      <span class="stag ${s.tag}">${s.label}</span>
      <div class="sname">${s.ico} ${s.name}</div>
      <div class="sdesc">${s.desc}</div>
      <button class="smore-btn" id="smorebtn-${i}" onclick="toggleMore(${i},'${s.name}')">MORE +</button>
      <div class="smore-content" id="smore-${i}"></div>
    </div>`).join('');
}

function sw(tab){
  ['crops','suggest','log'].forEach(t=>{document.getElementById('t-'+t).classList.toggle('active',t===tab);});
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['crops','suggest','log'][i]===tab);});
}

renderSuggests(defaultSuggests);loadLogs();renderCrops();
</script>
